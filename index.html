const { useState, useRef, useEffect } = React;

// Storage abstraction — uses window.storage in Claude artifact preview, localStorage in real browser
const STORE = {
  async get(key) {
    if (window.storage) {
      try { const r = await window.storage.get(key); return r ? r.value : null; } catch { return null; }
    }
    try { return localStorage.getItem(key); } catch { return null; }
  },
  async set(key, value) {
    if (window.storage) {
      try { await window.storage.set(key, value); } catch {}
    } else {
      try { localStorage.setItem(key, value); } catch {}
    }
  },
  async remove(key) {
    if (window.storage) {
      try { await window.storage.delete(key); } catch {}
    } else {
      try { localStorage.removeItem(key); } catch {}
    }
  },
  async list(prefix) {
    if (window.storage) {
      try { const r = await window.storage.list(prefix); return r ? r.keys : []; } catch { return []; }
    }
    try {
      return Object.keys(localStorage).filter(k => k.startsWith(prefix));
    } catch { return []; }
  },
};

// Shared field-note shorthand glossary — every doc type's system prompt includes this,
// since arborists write notes in shorthand and the model must interpret it correctly.
const SHORTHAND_GLOSSARY = `Field notes may use these shorthand abbreviations — interpret them accordingly:
d/w = deadwood
r/c or c/r = raise canopy / crown reduction (context-dependent; r/c after a canopy reference means raise canopy, c/r means crown reduction)
w/s = water sprouts
c/b = clear building
dbh = diameter at breast height
(Ftyd) = Front Yard
Ort. = ornamental
V. Oak = Valley Oak
L. Oak = Live Oak
B. Oak = Blue Oak
L/A = Liquidambar`;

const DOC_TYPES = [

}

Give each individual tree or stump grouping its own line item — never combine two separate trees into one line, even if they get identical treatment. Use ISA-standard terminology. If field notes are vague on a scope item, make a reasonable professional assumption and say so in that item's note.`,

const POLL_INTERVAL = 2500;
const MAX_POLLS = 60;

const todayLabel = () =>
  new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });

const timeLabel = () =>
  new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });

const DOC_TYPE_COLORS = {
  estimate: "#3D5A3E", arborist_report: "#2E6DA4", traq: "#B85C38",
  phc: "#6B5A2E", permit: "#4A3D6B", hoa: "#5A3D4A",
  impact: "#2E5A4A", insurance: "#5A2E2E",
};

function ArborAI() {
  const [activeMode, setActiveMode] = useState("voice");
  const [isRecording, setIsRecording] = useState(false);
  const [recordingSeconds, setRecordingSeconds] = useState(0);
  const [textInput, setTextInput] = useState("");
  const [uploadedFile, setUploadedFile] = useState(null);
  const [uploadedContent, setUploadedContent] = useState("");
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [transcript, setTranscript] = useState("");
  const [pulseActive, setPulseActive] = useState(false);
  const [assemblyKey, setAssemblyKey] = useState("");
  const [claudeKey, setClaudeKey] = useState("");
  const [showKeySettings, setShowKeySettings] = useState(false);
  const [showClaudeKeySettings, setShowClaudeKeySettings] = useState(false);
  const [txStatus, setTxStatus] = useState("idle");
  const [docTypeId, setDocTypeId] = useState("estimate");

  // Structured estimate data — only used when the selected doc type returns JSON
  const [estimateData, setEstimateData] = useState(null); // { lineItems, recommendations }
  const [jsonParseError, setJsonParseError] = useState(false);

  // Printable PDF-style view (uses the browser's Print > Save as PDF)
  const [showPrintView, setShowPrintView] = useState(false);
  const [businessProfile, setBusinessProfile] = useState(null);
  const [profileLoadError, setProfileLoadError] = useState(false);

  // Customer info
  const [customerName, setCustomerName] = useState("");
  const [customerAddress, setCustomerAddress] = useState("");
  const [customerPhone, setCustomerPhone] = useState("");
  const [customerEmail, setCustomerEmail] = useState("");
  const [showCustomerPanel, setShowCustomerPanel] = useState(true);
  const [scanStatus, setScanStatus] = useState("idle"); // idle | scanning | done | error
  const [scanError, setScanError] = useState("");

  // Offline recording queue
  const [isOnline, setIsOnline] = useState(typeof navigator !== "undefined" ? navigator.onLine : true);
  const [offlineQueue, setOfflineQueue] = useState([]);
  const [showQueuePanel, setShowQueuePanel] = useState(false);
  const queueProcessingRef = useRef(false);

  // Signature approval (Scenario A: customer present, signs on-device)
  const [approvalStatus, setApprovalStatus] = useState("none"); // none | signing | approved
  const [signatureData, setSignatureData] = useState(null); // base64 PNG
  const [approvedAt, setApprovedAt] = useState(null);
  const canvasRef = useRef(null);
  const drawingRef = useRef(false);

  // Save state
  const [showSavePanel, setShowSavePanel] = useState(false);
  const [saveFilename, setSaveFilename] = useState("");
  const [saveStatus, setSaveStatus] = useState("idle");
  const [saveError, setSaveError] = useState("");
  const [savedTo, setSavedTo] = useState("");

  // History & draft
  const [history, setHistory] = useState([]);
  const [expandedId, setExpandedId] = useState(null);
  const [draftBanner, setDraftBanner] = useState(null); // {input, mode, docTypeId, date}
  const [showHistory, setShowHistory] = useState(false);

  const timerRef = useRef(null);
  const autosaveRef = useRef(null);
  const fileInputRef = useRef(null);
  const customerFileInputRef = useRef(null);
  const mediaRecorderRef = useRef(null);
  const audioChunksRef = useRef([]);
  const streamRef = useRef(null);
  const recordingSecondsRef = useRef(0);

  // Load history + check for draft on mount
  useEffect(() => {
    (async () => {
      // Load history
      const keys = await STORE.list("arborai:history:");
      const items = [];
      for (const k of keys) {
        const raw = await STORE.get(k);
        if (raw) { try { items.push(JSON.parse(raw)); } catch {} }
      }
      items.sort((a, b) => b.ts - a.ts);
      setHistory(items);

      // Check for draft
      const raw = await STORE.get("arborai:draft");
      if (raw) {
        try {
          const d = JSON.parse(raw);
          if (d.input && d.input.trim()) setDraftBanner(d);
        } catch {}
      }

      // Load offline recording queue
      const qKeys = await STORE.list("arborai:offlineq:");
      const qItems = [];
      for (const k of qKeys) {
        const rawQ = await STORE.get(k);
        if (rawQ) { try { qItems.push(JSON.parse(rawQ)); } catch {} }
      }
      qItems.sort((a, b) => a.createdAt - b.createdAt);
      setOfflineQueue(qItems);

      // Load persisted AssemblyAI key
      const savedKey = await STORE.get("arborai:assemblyKey");
      if (savedKey) setAssemblyKey(savedKey);

      // Load persisted Claude API key
      const savedClaudeKey = await STORE.get("arborai:claudeKey");
      if (savedClaudeKey) setClaudeKey(savedClaudeKey);
    })();
  }, []);

  // Track online/offline + auto-retry queue when connection returns
  useEffect(() => {
    const goOnline = () => { setIsOnline(true); processQueue(); };
    const goOffline = () => setIsOnline(false);
    window.addEventListener("online", goOnline);
    window.addEventListener("offline", goOffline);
    return () => {
      window.removeEventListener("online", goOnline);
      window.removeEventListener("offline", goOffline);
    };
  }, [offlineQueue, assemblyKey]);

  // Auto-save draft every 30 seconds
  useEffect(() => {
    autosaveRef.current = setInterval(async () => {
      const input = transcript || textInput || uploadedContent;
      if (input.trim() && !result) {
        const draft = {
          input, mode: activeMode, docTypeId,
          customerName, customerAddress, customerPhone, customerEmail,
          date: `${todayLabel()} ${timeLabel()}`,
        };
        await STORE.set("arborai:draft", JSON.stringify(draft));
      }
    }, 30000);
    return () => clearInterval(autosaveRef.current);
  }, [transcript, textInput, uploadedContent, activeMode, docTypeId, result, customerName, customerAddress, customerPhone, customerEmail]);

  // Recording timer
  useEffect(() => {
    if (isRecording) {
      timerRef.current = setInterval(() => setRecordingSeconds((s) => { recordingSecondsRef.current = s + 1; return s + 1; }), 1000);
      setPulseActive(true);
    } else {
      clearInterval(timerRef.current);
      setPulseActive(false);
    }
    return () => clearInterval(timerRef.current);
  }, [isRecording]);

  const fmt = (s) => `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;

  const restoreDraft = () => {
    if (!draftBanner) return;
    setActiveMode(draftBanner.mode || "voice");
    setDocTypeId(draftBanner.docTypeId || "estimate");
    if (draftBanner.mode === "voice") setTranscript(draftBanner.input);
    else if (draftBanner.mode === "text") setTextInput(draftBanner.input);
    else setUploadedContent(draftBanner.input);
    if (draftBanner.customerName) setCustomerName(draftBanner.customerName);
    if (draftBanner.customerAddress) setCustomerAddress(draftBanner.customerAddress);
    if (draftBanner.customerPhone) setCustomerPhone(draftBanner.customerPhone);
    if (draftBanner.customerEmail) setCustomerEmail(draftBanner.customerEmail);
    setDraftBanner(null);
  };

  const dismissDraft = async () => {
    await STORE.remove("arborai:draft");
    setDraftBanner(null);
  };

  const startRecording = async () => {
    setTranscript(""); setResult(null); setError(null);
    setRecordingSeconds(0); setTxStatus("recording");
    recordingSecondsRef.current = 0;
    audioChunksRef.current = [];
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      streamRef.current = stream;
      const mime = MediaRecorder.isTypeSupported("audio/webm;codecs=opus") ? "audio/webm;codecs=opus" : "audio/webm";
      const mr = new MediaRecorder(stream, { mimeType: mime });
      mediaRecorderRef.current = mr;
      mr.ondataavailable = (e) => { if (e.data?.size > 0) audioChunksRef.current.push(e.data); };
      mr.onstop = async () => {
        streamRef.current?.getTracks().forEach((t) => t.stop());
        const blob = new Blob(audioChunksRef.current, { type: mime });
        if (!navigator.onLine) {
          await queueRecording(blob, mime, recordingSecondsRef.current);
          return;
        }
        await transcribeAudio(blob);
      };
      mr.start(1000);
      setIsRecording(true);
    } catch {
      setError("Microphone access denied. Please allow mic permissions and try again.");
      setTxStatus("idle");
    }
  };

  const stopRecording = () => {
    setIsRecording(false);
    if (mediaRecorderRef.current?.state !== "inactive") mediaRecorderRef.current.stop();
    setTxStatus("uploading");
  };

  const transcribeAudio = async (blob) => {
    if (!assemblyKey.trim()) {
      setTxStatus("idle");
      setError("Enter your AssemblyAI API key in ⚙ Settings above, then record again. Free key at assemblyai.com.");
      return;
    }
    try {
      setTxStatus("uploading");
      const up = await fetch("https://api.assemblyai.com/v2/upload", {
        method: "POST", headers: { Authorization: assemblyKey }, body: blob,
      });
      if (!up.ok) throw new Error(`Upload failed: ${up.status}`);
      const { upload_url } = await up.json();
      setTxStatus("transcribing");
      const job = await fetch("https://api.assemblyai.com/v2/transcript", {
        method: "POST",
        headers: { Authorization: assemblyKey, "Content-Type": "application/json" },
        body: JSON.stringify({ audio_url: upload_url, speaker_labels: true }),
      });
      if (!job.ok) throw new Error(`Job failed: ${job.status}`);
      const { id } = await job.json();
      for (let i = 0; i < MAX_POLLS; i++) {
        await new Promise((r) => setTimeout(r, POLL_INTERVAL));
        const poll = await fetch(`https://api.assemblyai.com/v2/transcript/${id}`, {
          headers: { Authorization: assemblyKey },
        });
        const data = await poll.json();
        if (data.status === "completed") {
          setTranscript(
            data.utterances
              ? data.utterances.map((u) => `Speaker ${u.speaker}: ${u.text}`).join("\n\n")
              : data.text || "(No speech detected)"
          );
          setTxStatus("done");
          return;
        }
        if (data.status === "error") throw new Error(data.error);
      }
      throw new Error("Timed out. Try a shorter recording.");
    } catch (err) {
      const isNetworkError = !navigator.onLine || err instanceof TypeError || /fetch/i.test(err.message || "");
      if (isNetworkError) {
        await queueRecording(blob, blob.type, recordingSecondsRef.current);
        setError(null);
        return;
      }
      setTxStatus("error");
      setError(`Transcription failed: ${err.message}`);
    }
  };

  // Persist AssemblyAI key whenever it changes
  useEffect(() => {
    if (assemblyKey.trim()) STORE.set("arborai:assemblyKey", assemblyKey.trim());
    else STORE.remove("arborai:assemblyKey");
  }, [assemblyKey]);

  // Persist Claude API key whenever it changes
  useEffect(() => {
    if (claudeKey.trim()) STORE.set("arborai:claudeKey", claudeKey.trim());
    else STORE.remove("arborai:claudeKey");
  }, [claudeKey]);

  const blobToBase64 = (blob) =>
    new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.onerror = () => reject(new Error("Could not read audio"));
      reader.readAsDataURL(blob);
    });

  const base64ToBlob = (base64, mimeType) => {
    const bytes = atob(base64);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    return new Blob([arr], { type: mimeType });
  };

  const queueRecording = async (blob, mimeType, seconds) => {
    const base64 = await blobToBase64(blob);
    const item = {
      id: `arborai:offlineq:${Date.now()}`,
      createdAt: Date.now(),
      dateLabel: `${todayLabel()} ${timeLabel()}`,
      base64, mimeType, seconds,
      customerName: customerName.trim(),
      status: "queued",
    };
    await STORE.set(item.id, JSON.stringify(item));
    setOfflineQueue((prev) => [...prev, item]);
    setTxStatus("queued");
  };

  const removeFromQueue = async (id) => {
    await STORE.remove(id);
    setOfflineQueue((prev) => prev.filter((q) => q.id !== id));
  };

  const transcribeQueuedItem = async (item) => {
    if (!assemblyKey.trim()) throw new Error("no-key");
    const blob = base64ToBlob(item.base64, item.mimeType);
    const up = await fetch("https://api.assemblyai.com/v2/upload", {
      method: "POST", headers: { Authorization: assemblyKey }, body: blob,
    });
    if (!up.ok) throw new Error(`Upload failed: ${up.status}`);
    const { upload_url } = await up.json();
    const job = await fetch("https://api.assemblyai.com/v2/transcript", {
      method: "POST",
      headers: { Authorization: assemblyKey, "Content-Type": "application/json" },
      body: JSON.stringify({ audio_url: upload_url, speaker_labels: true }),
    });
    if (!job.ok) throw new Error(`Job failed: ${job.status}`);
    const { id } = await job.json();
    for (let i = 0; i < MAX_POLLS; i++) {
      await new Promise((r) => setTimeout(r, POLL_INTERVAL));
      const poll = await fetch(`https://api.assemblyai.com/v2/transcript/${id}`, { headers: { Authorization: assemblyKey } });
      const data = await poll.json();
      if (data.status === "completed") {
        return data.utterances
          ? data.utterances.map((u) => `Speaker ${u.speaker}: ${u.text}`).join("\n\n")
          : data.text || "(No speech detected)";
      }
      if (data.status === "error") throw new Error(data.error);
    }
    throw new Error("Timed out");
  };

  const processQueue = async () => {
    if (queueProcessingRef.current) return;
    if (!navigator.onLine) return;
    if (!assemblyKey.trim()) return;
    queueProcessingRef.current = true;
    try {
      const pending = offlineQueue.filter((q) => q.status !== "done");
      for (const item of pending) {
        try {
          const transcript = await transcribeQueuedItem(item);
          const histItem = {
            id: `arborai:history:${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
            ts: Date.now(),
            date: item.dateLabel,
            docTypeId: "voicenote",
            docTypeShort: "Voice Note",
            customerName: item.customerName,
            filename: `Voice Note - ${item.customerName || "Unlabeled"} - ${item.dateLabel}`,
            preview: transcript.slice(0, 120).replace(/\n/g, " "),
            content: transcript,
          };
          await STORE.set(histItem.id, JSON.stringify(histItem));
          setHistory((prev) => [histItem, ...prev]);
          await removeFromQueue(item.id);
        } catch (err) {
          if (!navigator.onLine) break; // dropped mid-queue, stop and wait for next 'online' event
          // Otherwise mark as errored but keep in queue for manual retry
          const updated = { ...item, status: "error" };
          await STORE.set(item.id, JSON.stringify(updated));
          setOfflineQueue((prev) => prev.map((q) => (q.id === item.id ? updated : q)));
        }
      }
    } finally {
      queueProcessingRef.current = false;
    }
  };

  const handleFileUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploadedFile(file); setResult(null); setError(null);
    const reader = new FileReader();
    reader.onload = (ev) => { if (file.type === "text/plain") setUploadedContent(ev.target.result); };
    if (file.type === "text/plain") reader.readAsText(file);
    else setUploadedContent(`File ready: ${file.name}`);
  };

  const fileToBase64 = (file) =>
    new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.onerror = () => reject(new Error("Could not read file"));
      reader.readAsDataURL(file);
    });

  const handleCustomerScan = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setScanStatus("scanning"); setScanError("");
    if (!claudeKey.trim()) {
      setScanStatus("error");
      setScanError("Add your Claude API key below (under settings) before scanning documents.");
      return;
    }
    try {
      const isPdf = file.type === "application/pdf";
      const base64 = await fileToBase64(file);
      const contentBlock = isPdf
        ? { type: "document", source: { type: "base64", media_type: "application/pdf", data: base64 } }
        : { type: "image", source: { type: "base64", media_type: file.type || "image/jpeg", data: base64 } };
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": claudeKey.trim(),
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6", max_tokens: 500,
          system: `Extract customer contact info from this business card, work order, or contract. Respond with ONLY raw JSON, no markdown, no preamble, in exactly this shape:
{"name": "", "address": "", "phone": "", "email": ""}
Leave any field "" if not found. Do not guess or invent information.`,
          messages: [{ role: "user", content: [contentBlock, { type: "text", text: "Extract the customer contact info." }] }],
        }),
      });
      if (!res.ok) {
        const errBody = await res.text();
        throw new Error(`API error ${res.status}: ${errBody.slice(0, 200)}`);
      }
      const data = await res.json();
      const raw = data.content?.map((b) => b.text || "").join("") || "{}";
      const clean = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      if (parsed.name) setCustomerName(parsed.name);
      if (parsed.address) setCustomerAddress(parsed.address);
      if (parsed.phone) setCustomerPhone(parsed.phone);
      if (parsed.email) setCustomerEmail(parsed.email);
      setShowCustomerPanel(true);
      setScanStatus("done");
    } catch (err) {
      setScanStatus("error");
      setScanError(`Couldn't read that file (${err.message}). Try a clearer photo or enter details manually.`);
    }
  };

  const getInput = () => {
    if (activeMode === "voice") return transcript;
    if (activeMode === "text") return textInput;
    return uploadedContent;
  };

  const generateDocument = async () => {
    const input = getInput();
    if (!input.trim()) { setError("Please provide some field notes first."); return; }
    if (!claudeKey.trim()) { setError("Add your Claude API key below (under settings) before generating documents."); return; }
    const docType = DOC_TYPES.find((d) => d.id === docTypeId);
    setLoading(true); setResult(null); setError(null);
    setEstimateData(null); setJsonParseError(false);
    setShowSavePanel(false); setSaveStatus("idle"); setSavedTo("");
    setSaveFilename(customerName.trim() ? `${docType.short} - ${customerName.trim()} - ${todayLabel()}` : `${docType.short} - ${todayLabel()}`);
    const customerLines = [
      customerName.trim() && `Name: ${customerName.trim()}`,
      customerAddress.trim() && `Address: ${customerAddress.trim()}`,
      customerPhone.trim() && `Phone: ${customerPhone.trim()}`,
      customerEmail.trim() && `Email: ${customerEmail.trim()}`,
    ].filter(Boolean).join("\n");
    const userContent = customerLines
      ? `Customer information (include in the document header):\n${customerLines}\n\nField notes:\n\n${input}`
      : `Field notes:\n\n${input}`;
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": claudeKey.trim(),
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6", max_tokens: 1200,
          system: docType.prompt,
          messages: [{ role: "user", content: userContent }],
        }),
      });
      if (!res.ok) {
        const errBody = await res.text();
        throw new Error(`API error ${res.status}: ${errBody.slice(0, 200)}`);
      }
      const data = await res.json();
      const text = data.content?.map((b) => b.text || "").join("\n") || "";

      if (docType.structured) {
        try {
          const cleaned = text.replace(/```json|```/g, "").trim();
          const parsed = JSON.parse(cleaned);
          const itemsWithIds = (parsed.lineItems || []).map((it, i) => ({
            id: `${Date.now()}-${i}`,
            location: it.location || "",
            action: it.action || "",
            note: it.note || "",
            cost: it.cost || "",
          }));
          setEstimateData({
            lineItems: itemsWithIds,
            recommendations: parsed.recommendations || "",
          });
          setResult(text); // keep raw text too, for saving/copy fallback
        } catch {
          // Model didn't return valid JSON — fall back to showing raw text so nothing is lost
          setJsonParseError(true);
          setResult(text);
        }
      } else {
        setResult(text);
      }
    } catch (err) { setError(`Couldn't generate the document (${err.message}). Please try again.`); }
    finally { setLoading(false); }
  };

  // Editable line-item helpers — only relevant when estimateData is set
  const updateLineItem = (id, field, value) => {
    setEstimateData((prev) => ({
      ...prev,
      lineItems: prev.lineItems.map((it) => (it.id === id ? { ...it, [field]: value } : it)),
    }));
  };
  const removeLineItem = (id) => {
    setEstimateData((prev) => ({ ...prev, lineItems: prev.lineItems.filter((it) => it.id !== id) }));
  };
  const addLineItem = () => {
    setEstimateData((prev) => ({
      ...prev,
      lineItems: [...prev.lineItems, { id: `${Date.now()}`, location: "", action: "", note: "", cost: "" }],
    }));
  };
  const estimateSubtotal = () =>
    (estimateData?.lineItems || []).reduce((sum, it) => sum + (parseFloat(it.cost) || 0), 0);

  const openPrintView = async () => {
    setProfileLoadError(false);
    try {
      const result = await window.storage.get("business-profile", false);
      setBusinessProfile(result?.value ? JSON.parse(result.value) : null);
    } catch {
      // No saved profile yet — proceed with blanks so the arborist can still see the layout
      setBusinessProfile(null);
      setProfileLoadError(true);
    }
    setShowPrintView(true);
  };

  const getCanvasPoint = (e) => {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
  };

  const startDraw = (e) => {
    e.preventDefault();
    drawingRef.current = true;
    const ctx = canvasRef.current.getContext("2d");
    const { x, y } = getCanvasPoint(e);
    ctx.beginPath();
    ctx.moveTo(x, y);
  };

  const moveDraw = (e) => {
    if (!drawingRef.current) return;
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const { x, y } = getCanvasPoint(e);
    ctx.lineTo(x, y);
    ctx.strokeStyle = COLORS.bark;
    ctx.lineWidth = 2.5;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.stroke();
  };

  const endDraw = () => { drawingRef.current = false; };

  const clearSignature = () => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
  };

  const confirmApproval = () => {
    const canvas = canvasRef.current;
    const dataUrl = canvas.toDataURL("image/png");
    const now = new Date();
    const stamp = `${todayLabel()} ${timeLabel()}`;
    setSignatureData(dataUrl);
    setApprovedAt(stamp);
    setApprovalStatus("approved");
    setResult((prev) => `${prev}\n\n---\nApproved by ${customerName.trim() || "customer"} on ${stamp}\n(Signature captured on device)`);
  };

  const resendConfirmationEmail = () => {
    const docType = DOC_TYPES.find((d) => d.id === docTypeId);
    const subject = `Your ${docType?.label || "Document"} — Approved`;
    const bodyLines = [
      `Hi ${customerName.trim() || "there"},`,
      "",
      `This confirms your approval of the ${docType?.label || "document"} on ${approvedAt}.`,
      "",
      result.slice(0, 1500),
      "",
      "(Full copy also saved to our files.)",
    ];
    const mailto = `mailto:${encodeURIComponent(customerEmail.trim())}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyLines.join("\n"))}`;
    window.location.href = mailto;
  };

  const saveToHistory = async (filename, content, docType) => {
    const item = {
      id: `arborai:history:${Date.now()}`,
      ts: Date.now(),
      date: `${todayLabel()} ${timeLabel()}`,
      docTypeId: docType.id,
      docTypeShort: docType.short,
      customerName: customerName.trim(),
      filename,
      preview: content.slice(0, 120).replace(/\n/g, " "),
      content,
      approved: approvalStatus === "approved",
      approvedAt: approvalStatus === "approved" ? approvedAt : null,
      signatureData: approvalStatus === "approved" ? signatureData : null,
    };
    await STORE.set(item.id, JSON.stringify(item));
    setHistory((prev) => [item, ...prev]);
    // Clear draft now that we have a saved result
    await STORE.remove("arborai:draft");
  };

  const saveToCloud = async (provider) => {
    if (!saveFilename.trim()) { setSaveError("Please enter a filename."); return; }
    if (!claudeKey.trim()) { setSaveError("Add your Claude API key below (under settings) before saving to cloud."); return; }
    setSaveStatus("saving"); setSaveError("");
    const mcp = provider === "drive" ? DRIVE_MCP : M365_MCP;
    const providerLabel = provider === "drive" ? "Google Drive" : "OneDrive";
    const filename = saveFilename.trim().replace(/[/\\?%*:|"<>]/g, "-");
    const prompt = provider === "drive"
      ? `Save a file to Google Drive. Search for a folder named "ArborAI" in My Drive. If it exists use it, if not create it. Then create a file named "${filename}.txt" inside that folder with this content:\n\n${result}\n\nConfirm when saved.`
      : `Save a file to OneDrive. Check if a folder named "ArborAI" exists. If not create it. Then create a file named "${filename}.txt" inside that folder with this content:\n\n${result}\n\nConfirm when saved.`;
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": claudeKey.trim(),
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6", max_tokens: 500,
          messages: [{ role: "user", content: prompt }],
          mcp_servers: [mcp],
        }),
      });
      if (!res.ok) {
        const errBody = await res.text();
        throw new Error(`API error ${res.status}: ${errBody.slice(0, 200)}`);
      }
      const data = await res.json();
      const text = data.content?.map((b) => b.text || "").join("") || "";
      if (data.error || text.toLowerCase().includes("error") || text.toLowerCase().includes("failed")) {
        throw new Error(text || "Save failed");
      }
      setSaveStatus("saved");
      setSavedTo(`${providerLabel} › ArborAI › ${filename}.txt`);
      // Save to local history
      const docType = DOC_TYPES.find((d) => d.id === docTypeId);
      await saveToHistory(filename, result, docType);
    } catch (err) {
      setSaveStatus("error");
      setSaveError(`Could not save to ${providerLabel}. Make sure it's connected in Claude settings.`);
    }
  };

  // New Document — keep input, clear result
  const newDocument = () => {
    setResult(null);
    setShowSavePanel(false);
    setSaveStatus("idle");
    setSavedTo("");
    setDocTypeId("estimate");
    setError(null);
    setApprovalStatus("none"); setSignatureData(null); setApprovedAt(null);
  };

  // New Visit — full reset
  const reset = async () => {
    setResult(null); setTranscript(""); setTextInput("");
    setUploadedFile(null); setUploadedContent(""); setError(null);
    setRecordingSeconds(0); setTxStatus("idle");
    setShowSavePanel(false); setSaveStatus("idle"); setSavedTo("");
    setDocTypeId("estimate");
    setCustomerName(""); setCustomerAddress(""); setCustomerPhone(""); setCustomerEmail("");
    setScanStatus("idle"); setScanError("");
    setApprovalStatus("none"); setSignatureData(null); setApprovedAt(null);
    await STORE.remove("arborai:draft");
  };

  const deleteHistoryItem = async (id) => {
    await STORE.remove(id);
    setHistory((prev) => prev.filter((h) => h.id !== id));
    if (expandedId === id) setExpandedId(null);
  };

  const busy = txStatus === "uploading" || txStatus === "transcribing";
  const canGenerate = !loading && !busy && !!getInput().trim();

  // ---- Printable estimate view (browser Print > Save as PDF) ----
  if (showPrintView && estimateData) {
    const profile = businessProfile || {};
    const subtotal = estimateSubtotal();
    const total = subtotal;
    const todayStr = new Date().toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
    const shortName = profile.shortName || profile.businessName || "This company";

    return (
      <div style={{ fontFamily: "Georgia, serif", background: COLORS.parchment, minHeight: "100vh", color: COLORS.bark }}>
        {/* Screen-only toolbar — hidden when printing */}
        <div className="no-print" style={{ background: COLORS.bark, padding: "14px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <button onClick={() => setShowPrintView(false)}
            style={{ background: "none", border: "none", color: COLORS.sage, fontSize: "13px", cursor: "pointer", fontFamily: "Georgia, serif" }}>
            ← Back to Edit
          </button>
          <button onClick={() => window.print()}
            style={{ padding: "9px 16px", background: COLORS.fieldYellow, color: COLORS.bark, border: "none", borderRadius: "8px", fontSize: "13px", fontWeight: "bold", cursor: "pointer", fontFamily: "Georgia, serif" }}>
            🖨️ Print / Save as PDF
          </button>
        </div>

        {!profile.businessName && (
          <div className="no-print" style={{ background: "#FDF6E3", border: `1px solid ${COLORS.fieldYellow}`, borderRadius: "8px", padding: "12px 16px", margin: "14px 20px 0", fontSize: "12.5px", color: COLORS.bark }}>
            No Business Profile found yet — this document will show blank company info until you fill out Business Profile settings.
          </div>
        )}

        {/* Printable document */}
        <div style={{ maxWidth: "680px", margin: "0 auto", padding: "28px 28px", background: COLORS.white }}>

          {/* Header row: badge (left) / logo (center) / doctype+address (right) */}
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: "10px" }}>
            <div style={{ width: "70px", flexShrink: 0 }}>
              {profile.showTciaBadge && profile.tciaLogoDataUrl && (
                <img src={profile.tciaLogoDataUrl} alt="TCIA Accredited" style={{ width: "70px", height: "70px", objectFit: "contain" }} />
              )}
            </div>
            <div style={{ flex: 1, display: "flex", justifyContent: "center", alignItems: "flex-end" }}>
              {profile.logoDataUrl ? (
                <img src={profile.logoDataUrl} alt="Logo" style={{ maxWidth: "270px", maxHeight: "90px", objectFit: "contain" }} />
              ) : (
                <div style={{ fontSize: "18px", fontWeight: "bold", color: COLORS.bark, textAlign: "center" }}>{profile.businessName || "Your Business Name"}</div>
              )}
            </div>
            <div style={{ width: "220px", flexShrink: 0, textAlign: "right" }}>
              <div style={{ fontSize: "20px", fontWeight: "bold", color: COLORS.moss }}>PROPOSAL</div>
              <div style={{ fontSize: "10.5px", color: COLORS.bark, lineHeight: "1.5", marginTop: "2px" }}>
                {profile.address || "Business address not set"}<br />
                {[profile.officePhone, profile.officeEmail].filter(Boolean).join(" · ") || "Phone / email not set"}
              </div>
            </div>
          </div>

          {profile.showIsaBadge && profile.isaLogoDataUrl && (
            <div style={{ textAlign: "center", marginTop: "-4px" }}>
              <img src={profile.isaLogoDataUrl} alt="ISA Member" style={{ width: "50px", height: "50px", objectFit: "contain" }} />
            </div>
          )}

          {/* License — tight, right under the badge/logo */}
          <div style={{ fontSize: "9px", color: COLORS.dusty, marginTop: "0px" }}>{profile.license || "License # not set"}</div>

          {/* Date / Salesperson row */}
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: "6px", fontSize: "11px" }}>
            <div style={{ fontWeight: "bold" }}>{todayStr}</div>
            <div style={{ fontWeight: "bold", textAlign: "right" }}>
              Salesperson: <span style={{ fontWeight: "normal" }}>{[profile.salesPhone, profile.salesEmail].filter(Boolean).join(" · ") || "Not assigned"}</span>
            </div>
          </div>

          {/* Client / Worksite */}
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: "6px", fontSize: "12.5px", lineHeight: "1.6" }}>
            <div>
              {customerName || "—"}<br />
              {customerAddress || ""}
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontWeight: "bold" }}>Worksite:</div>
              {customerAddress || ""}
            </div>
          </div>
          <div style={{ fontSize: "12.5px", marginTop: "6px" }}>
            <strong>Phone:</strong> {customerPhone || "—"}
          </div>

          {/* Description / Cost header — sage green */}
          <div style={{ background: COLORS.sage, color: COLORS.bark, fontSize: "10px", fontWeight: "bold", textTransform: "uppercase", letterSpacing: "0.04em", padding: "6px 10px", display: "flex", justifyContent: "space-between", marginTop: "14px" }}>
            <span>Description</span><span>Cost</span>
          </div>

          {/* Line items — zero spacing, bold location only, no header label */}
          {estimateData.lineItems.map((it) => (
            <div key={it.id} style={{ display: "flex", justifyContent: "space-between", gap: "12px", padding: "6px 10px" }}>
              <div style={{ flex: 1, fontSize: "12px", lineHeight: "1.5" }}>
                <strong>{it.location}</strong> — {it.action}{it.note ? ` ${it.note}` : ""}
              </div>
              <div style={{ fontWeight: "bold", fontSize: "12.5px", whiteSpace: "nowrap" }}>${(parseFloat(it.cost) || 0).toFixed(2)}</div>
            </div>
          ))}

          {estimateData.recommendations && (
            <p style={{ fontSize: "11.5px", color: COLORS.bark, lineHeight: "1.6", marginTop: "12px" }}>
              <strong>Recommendations: </strong>{estimateData.recommendations}
            </p>
          )}

          <div style={{ borderTop: `1px solid ${COLORS.parchmentDark}`, marginTop: "12px", paddingTop: "10px" }}>
            {profile.acceptStatement && (
              <p style={{ fontSize: "9.5px", color: COLORS.dusty, lineHeight: "1.5", margin: 0 }}>
                <strong style={{ color: COLORS.moss }}>TERMS OF AGREEMENT:</strong>{" "}
                {profile.acceptStatement.replace(/\{company\}/g, shortName)}
              </p>
            )}
            {profile.paymentTerms && (
              <p style={{ fontSize: "9.5px", color: COLORS.dusty, lineHeight: "1.5", margin: 0 }}>
                <strong style={{ color: COLORS.moss }}>PAYMENT TERMS:</strong> {profile.paymentTerms}
              </p>
            )}
          </div>

          {/* Total only — no subtotal/tax lines shown */}
          <div style={{ marginTop: "14px", marginLeft: "auto", width: "220px", borderTop: `1px solid ${COLORS.moss}`, paddingTop: "6px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontWeight: "bold", fontSize: "15px", color: COLORS.moss }}>
              <span>Total:</span><span>${total.toFixed(2)}</span>
            </div>
          </div>

          <p style={{ fontSize: "9px", fontStyle: "italic", color: COLORS.dusty, marginTop: "18px", marginBottom: "8px" }}>
            By signing below, you agree to the Terms of Agreement and Payment Terms above.
          </p>

          {/* Signature */}
          <div>
            {approvalStatus === "approved" && signatureData ? (
              <div>
                <img src={signatureData} alt="Signature" style={{ height: "44px" }} />
                <div style={{ borderTop: `1px solid ${COLORS.bark}`, width: "260px", marginTop: "2px" }} />
                <div style={{ fontSize: "10.5px", color: COLORS.dusty, marginTop: "4px" }}>Signed electronically · {approvedAt}</div>
              </div>
            ) : (
              <div>
                <div style={{ borderTop: `1px solid ${COLORS.dusty}`, width: "260px", marginTop: "20px" }} />
                <div style={{ fontSize: "10.5px", color: COLORS.dusty, marginTop: "4px" }}>Signature &amp; date</div>
              </div>
            )}
          </div>

          <div style={{ marginTop: "20px", display: "flex", justifyContent: "space-between", fontSize: "9px", color: COLORS.dusty }}>
            <span>Generated with ArborAI</span>
            <span style={{ position: "absolute", left: "50%", transform: "translateX(-50%)" }}>Page 1 of 1</span>
          </div>
        </div>

        <style>{`
          @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
          }
        `}</style>
      </div>
    );
  }

  const statusConfig = {
    uploading:    { label: "Uploading audio…",                    color: COLORS.blue, dot: true  },
    transcribing: { label: "Transcribing · identifying speakers…", color: COLORS.moss, dot: true  },
    done:         { label: "Transcript ready ✅",                  color: COLORS.moss, dot: false },
    error:        { label: "Transcription failed ⚠️",             color: COLORS.alert, dot: false },
    queued:       { label: "No signal — recording saved, will upload automatically 📡", color: COLORS.fieldYellow, dot: true },
  };

  const inputModes = [
    { id: "voice",  label: "Voice",  icon: "🎙️", hint: "Record field audio"  },
    { id: "upload", label: "Upload", icon: "📄", hint: "Photo or document"    },
    { id: "text",   label: "Type",   icon: "✏️", hint: "Enter notes manually" },
  ];

  return (
    <div style={{ fontFamily: "'Georgia', serif", background: COLORS.parchment, minHeight: "100vh", color: COLORS.bark }}>
      {/* Header */}

                    <input value={customerEmail} onChange={(e) => setCustomerEmail(e.target.value)} placeholder="Email"

                  </div>
                </div>
              )}
            </div>

                style={{ width: "100%", padding: "11px 16px", background: "none", border: "none", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", fontFamily: "Georgia, serif" }}>
                <span style={{ fontSize: "13px", color: COLORS.dusty }}>
                  ⚙ Claude API Key {claudeKey ? <span style={{ color: COLORS.moss, marginLeft: "8px", fontWeight: "bold" }}>✓ Set</span> : <span style={{ color: COLORS.alert, marginLeft: "8px", fontWeight: "bold" }}>Required</span>}
                </span>
                <span style={{ color: COLORS.dusty, fontSize: "11px" }}>{showClaudeKeySettings ? "▲ hide" : "▼ show"}</span>
              </button>

                <div style={{ padding: "0 16px 14px" }}>

                  <div style={{ fontSize: "11px", color: COLORS.dusty, marginTop: "6px" }}>

                  style={{ flex: 1, padding: "10px 6px", cursor: "pointer", fontFamily: "Georgia, serif", background: activeMode === m.id ? COLORS.bark : COLORS.white, color: activeMode === m.id ? COLORS.fieldYellow : COLORS.bark, border: `1px solid ${activeMode === m.id ? COLORS.bark : COLORS.parchmentDark}`, borderRadius: "8px", transition: "all 0.15s" }}>

                  <div style={{ fontSize: "13px", fontWeight: "bold" }}>{m.label}</div>
                  <div style={{ fontSize: "11px", opacity: 0.7, marginTop: "2px" }}>{m.hint}</div>
                </button>
              ))}
            </div>

            {/* VOICE MODE */}
            {activeMode === "voice" && (
              <div>
                {/* API Key */}
                <div style={{ marginBottom: "14px", background: COLORS.white, borderRadius: "10px", border: `1px solid ${COLORS.parchmentDark}`, overflow: "hidden" }}>
                  <button onClick={() => setShowKeySettings((v) => !v)}
                    style={{ width: "100%", padding: "11px 16px", background: "none", border: "none", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", fontFamily: "Georgia, serif" }}>
                    <span style={{ fontSize: "13px", color: COLORS.dusty }}>
                      ⚙ AssemblyAI Key {assemblyKey && <span style={{ color: COLORS.moss, marginLeft: "8px", fontWeight: "bold" }}>✓ Set</span>}
                    </span>
                    <span style={{ color: COLORS.dusty, fontSize: "11px" }}>{showKeySettings ? "▲ hide" : "▼ show"}</span>
                  </button>
                  {showKeySettings && (
                    <div style={{ padding: "0 16px 14px" }}>
                      <input type="password" value={assemblyKey} onChange={(e) => setAssemblyKey(e.target.value)}

                        style={{ width: "100%", padding: "9px 12px", borderRadius: "6px", border: `1px solid ${COLORS.parchmentDark}`, fontFamily: "monospace", fontSize: "13px", color: COLORS.bark, background: COLORS.parchment, boxSizing: "border-box" }} />
                      <div style={{ fontSize: "11px", color: COLORS.dusty, marginTop: "6px" }}>
                        Free tier: 185 hrs · ~6¢/hr after · <a href="https://www.assemblyai.com" target="_blank" rel="noreferrer" style={{ color: COLORS.moss }}>assemblyai.com</a><br />
                        Saved on this device — you only need to enter it once.
                      </div>
                    </div>
                  )}
                </div>

                {/* Offline recording queue */}
                {offlineQueue.length > 0 && (
                  <div style={{ marginBottom: "12px", background: COLORS.white, borderRadius: "10px", border: `1px solid ${COLORS.fieldYellow}`, overflow: "hidden" }}>
                    <button onClick={() => setShowQueuePanel((v) => !v)}
                      style={{ width: "100%", padding: "10px 14px", background: "none", border: "none", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", fontFamily: "Georgia, serif" }}>
                      <span style={{ fontSize: "13px", color: COLORS.bark, fontWeight: "bold" }}>
                        📡 {offlineQueue.length} recording{offlineQueue.length > 1 ? "s" : ""} waiting to upload
                      </span>
                      <span style={{ color: COLORS.dusty, fontSize: "11px" }}>{showQueuePanel ? "▲ hide" : "▼ show"}</span>
                    </button>
                    {showQueuePanel && (
                      <div style={{ padding: "0 14px 14px" }}>
                        <div style={{ fontSize: "12px", color: COLORS.dusty, marginBottom: "10px" }}>
                          {isOnline ? "Back online — tap Retry to upload now." : "No signal. These will upload automatically once you're back in range."}
                        </div>
                        {offlineQueue.map((q) => (
                          <div key={q.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderTop: `1px solid ${COLORS.parchmentDark}` }}>
                            <div>
                              <div style={{ fontSize: "13px", color: COLORS.bark, fontWeight: "600" }}>{q.customerName || "Unlabeled"} · {fmt(q.seconds)}</div>
                              <div style={{ fontSize: "11px", color: q.status === "error" ? COLORS.alert : COLORS.dusty }}>
                                {q.dateLabel}{q.status === "error" ? " · upload failed, will retry" : ""}
                              </div>
                            </div>
                            <div style={{ display: "flex", gap: "10px" }}>
                              <button onClick={processQueue} disabled={!isOnline || !assemblyKey.trim()}
                                style={{ background: "none", border: "none", color: isOnline && assemblyKey.trim() ? COLORS.moss : COLORS.dusty, cursor: isOnline && assemblyKey.trim() ? "pointer" : "default", fontSize: "12px", fontWeight: "bold" }}>Retry</button>
                              <button onClick={() => removeFromQueue(q.id)}
                                style={{ background: "none", border: "none", color: COLORS.alert, cursor: "pointer", fontSize: "12px" }}>Delete</button>
                            </div>
                          </div>
                        ))}
                        {!assemblyKey.trim() && (
                          <div style={{ fontSize: "11px", color: COLORS.alert, marginTop: "8px" }}>Add your AssemblyAI key above to enable uploads.</div>
                        )}
                      </div>
                    )}
                  </div>
                )}

                {!isOnline && (
                  <div style={{ display: "flex", alignItems: "center", gap: "8px", padding: "8px 14px", background: `${COLORS.fieldYellow}20`, border: `1px solid ${COLORS.fieldYellow}`, borderRadius: "8px", marginBottom: "12px" }}>
                    <span style={{ fontSize: "12px", color: COLORS.bark }}>🔴 No connection — recordings will be saved on-device and uploaded automatically when you're back in range.</span>
                  </div>
                )}

                {/* Transcription status */}
                {statusConfig[txStatus] && (
                  <div style={{ display: "flex", alignItems: "center", gap: "8px", padding: "9px 14px", background: `${statusConfig[txStatus].color}15`, border: `1px solid ${statusConfig[txStatus].color}40`, borderRadius: "8px", marginBottom: "12px" }}>
                    {statusConfig[txStatus].dot && <div style={{ width: "9px", height: "9px", borderRadius: "50%", background: statusConfig[txStatus].color, animation: "blink 1s infinite", flexShrink: 0 }} />}
                    <span style={{ fontSize: "13px", color: statusConfig[txStatus].color, fontWeight: "600" }}>{statusConfig[txStatus].label}</span>
                  </div>
                )}

                {/* Record button */}
                <div style={{ background: COLORS.white, borderRadius: "12px", padding: "32px 24px", textAlign: "center", border: `1px solid ${COLORS.parchmentDark}`, marginBottom: "16px" }}>

                    {pulseActive && <div style={{ position: "absolute", inset: "-14px", borderRadius: "50%", border: `3px solid ${COLORS.alert}`, animation: "pulse 1.4s ease-out infinite" }} />}
                    <button onClick={isRecording ? stopRecording : startRecording} disabled={busy}
                      style={{ width: "88px", height: "88px", borderRadius: "50%", border: "none", background: isRecording ? COLORS.alert : busy ? COLORS.dusty : COLORS.moss, cursor: busy ? "default" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "36px", transition: "background 0.2s", boxShadow: isRecording ? `0 0 0 6px rgba(184,92,56,0.2)` : "none" }}>
                      {isRecording ? "⏹" : busy ? "⏳" : "🎙️"}
                    </button>
                  </div>
                  {isRecording ? (
                    <div>
                      <div style={{ color: COLORS.alert, fontWeight: "bold", fontSize: "16px" }}>Recording — {fmt(recordingSeconds)}</div>
                      <div style={{ color: COLORS.dusty, fontSize: "13px", marginTop: "4px" }}>Speak naturally · tap ⏹ to stop</div>
                    </div>
                  ) : busy ? (
                    <div>
                      <div style={{ fontWeight: "bold", fontSize: "15px", color: COLORS.moss }}>{txStatus === "uploading" ? "Uploading audio…" : "Transcribing…"}</div>
                      <div style={{ color: COLORS.dusty, fontSize: "13px", marginTop: "4px" }}>{txStatus === "transcribing" ? "Identifying speakers · ~15–30 sec" : "Sending to AssemblyAI"}</div>
                    </div>
                  ) : (
                    <div>
                      <div style={{ fontWeight: "bold", fontSize: "16px", color: COLORS.bark }}>Tap to record</div>
                      <div style={{ color: COLORS.dusty, fontSize: "13px", marginTop: "4px" }}>Walk the property and speak as you go</div>
                    </div>
                  )}
                </div>

                  <div style={{ background: COLORS.white, border: `1px solid ${COLORS.parchmentDark}`, borderRadius: "10px", padding: "16px", marginBottom: "16px" }}>

                      <div style={{ fontSize: "11px", color: COLORS.dusty, textTransform: "uppercase", letterSpacing: "0.1em" }}>Transcript</div>
                      <button onClick={() => { setTranscript(""); setTxStatus("idle"); }} style={{ background: "none", border: "none", color: COLORS.dusty, cursor: "pointer", fontSize: "12px" }}>Clear</button>
                    </div>
                    <pre style={{ margin: 0, whiteSpace: "pre-wrap", fontFamily: "Georgia, serif", fontSize: "13px", lineHeight: "1.7", color: COLORS.bark }}>{transcript}</pre>
                  </div>
                )}
              </div>
            )}

            {/* UPLOAD MODE */}
            {activeMode === "upload" && (
              <div>
                <div onClick={() => fileInputRef.current?.click()}

                  <div style={{ fontSize: "40px", marginBottom: "12px" }}>{uploadedFile ? "✅" : "📸"}</div>
                  {uploadedFile ? (
                    <div>
                      <div style={{ fontWeight: "bold", color: COLORS.moss, fontSize: "15px" }}>{uploadedFile.name}</div>
                      <div style={{ color: COLORS.dusty, fontSize: "12px", marginTop: "4px" }}>Tap to replace</div>
                    </div>
                  ) : (
                    <div>
                      <div style={{ fontWeight: "bold", fontSize: "15px" }}>Tap to upload</div>
                      <div style={{ color: COLORS.dusty, fontSize: "13px", marginTop: "6px" }}>Handwritten notes, photos, PDFs, or prior reports</div>
                    </div>
                  )}
                </div>
                <input ref={fileInputRef} type="file" accept="image/*,.pdf,.txt,.doc,.docx" onChange={handleFileUpload} style={{ display: "none" }} />
                {uploadedContent && (
                  <div style={{ background: COLORS.white, border: `1px solid ${COLORS.parchmentDark}`, borderRadius: "10px", padding: "16px", marginBottom: "16px" }}>
                    <div style={{ fontSize: "11px", color: COLORS.dusty, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "8px" }}>Document ready</div>
                    <p style={{ margin: 0, fontSize: "13px", color: COLORS.bark, lineHeight: "1.5" }}>{uploadedContent.slice(0, 200)}{uploadedContent.length > 200 ? "…" : ""}</p>
                  </div>
                )}
              </div>
            )}

            {/* TEXT MODE */}
            {activeMode === "text" && (
              <div style={{ marginBottom: "16px" }}>
                <textarea value={textInput} onChange={(e) => setTextInput(e.target.value)}
                  placeholder={"Type your field notes here…\n\nExample: Large oak on north side, ~60ft, 30% crown dieback. Two pine removals near fence line leaning toward structure. Stump grinding on both pines."}
                  rows={9}
                  style={{ width: "100%", padding: "16px", borderRadius: "10px", border: `1px solid ${COLORS.parchmentDark}`, fontFamily: "Georgia, serif", fontSize: "14px", lineHeight: "1.7", color: COLORS.bark, background: COLORS.white, resize: "vertical", boxSizing: "border-box", outline: "none" }} />
                <div style={{ textAlign: "right", fontSize: "12px", color: COLORS.dusty, marginTop: "4px" }}>{textInput.length} characters</div>
              </div>
            )}

            {/* Error */}
            {error && (
              <div style={{ background: "#FDF0EC", border: `1px solid ${COLORS.alert}`, borderRadius: "8px", padding: "12px 16px", marginBottom: "16px", color: COLORS.alert, fontSize: "13px", lineHeight: "1.5" }}>
                ⚠️ {error}
              </div>
            )}

            {/* Doc type selector + Generate */}
            {!result && (
              <div>
                <div style={{ marginBottom: "10px" }}>
                  <div style={{ fontSize: "11px", color: COLORS.dusty, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "6px" }}>Document Type</div>
                  <div style={{ position: "relative" }}>
                    <select value={docTypeId} onChange={(e) => setDocTypeId(e.target.value)}
                      style={{ width: "100%", padding: "12px 36px 12px 14px", background: COLORS.white, border: `1px solid ${COLORS.parchmentDark}`, borderRadius: "8px", fontFamily: "Georgia, serif", fontSize: "14px", color: COLORS.bark, cursor: "pointer", appearance: "none", WebkitAppearance: "none" }}>
                      {DOC_TYPES.map((d) => <option key={d.id} value={d.id}>{d.label}</option>)}
                    </select>
                    <span style={{ position: "absolute", right: "12px", top: "50%", transform: "translateY(-50%)", pointerEvents: "none", color: COLORS.dusty, fontSize: "12px" }}>▼</span>
                  </div>
                </div>

                {DOC_TYPES.find((d) => d.id === docTypeId)?.traqWarning && (
                  <div style={{ background: "#FFF8EC", border: `1px solid ${COLORS.fieldYellow}`, borderRadius: "8px", padding: "11px 14px", marginBottom: "10px", fontSize: "12px", color: COLORS.bark, lineHeight: "1.5" }}>
                    ⚠️ <strong>TRAQ Draft only.</strong> Must be reviewed and certified by an ISA TRAQ-certified arborist before any use or distribution.
                  </div>
                )}

                <button onClick={generateDocument} disabled={!canGenerate}
                  style={{ width: "100%", padding: "16px", background: canGenerate ? COLORS.fieldYellow : COLORS.parchmentDark, color: COLORS.bark, border: "none", borderRadius: "10px", fontSize: "16px", fontWeight: "bold", cursor: canGenerate ? "pointer" : "default", fontFamily: "Georgia, serif", letterSpacing: "0.03em", opacity: loading ? 0.7 : 1, transition: "all 0.2s" }}>
                  {loading ? "Generating…" : `Generate ${DOC_TYPES.find((d) => d.id === docTypeId)?.short} →`}
                </button>
              </div>
            )}

            {loading && (
              <div style={{ textAlign: "center", padding: "24px", color: COLORS.dusty, fontSize: "14px" }}>
                <div style={{ fontSize: "28px", marginBottom: "8px" }}>🌳</div>
                ArborAI is preparing your document…
              </div>
            )}

            {/* Result */}
            {result && (
              <div style={{ marginTop: "8px" }}>
                <div style={{ background: COLORS.white, border: `1px solid ${COLORS.sage}`, borderRadius: "12px", padding: "24px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                      <div style={{ background: DOC_TYPE_COLORS[docTypeId] || COLORS.moss, color: COLORS.white, fontSize: "10px", fontWeight: "bold", padding: "3px 7px", borderRadius: "4px", letterSpacing: "0.05em" }}>
                        {DOC_TYPES.find((d) => d.id === docTypeId)?.short}
                      </div>
                      <div style={{ fontSize: "11px", color: COLORS.moss, fontWeight: "bold", textTransform: "uppercase", letterSpacing: "0.08em" }}>Generated</div>
                    </div>
                    <div style={{ fontSize: "11px", color: COLORS.dusty }}>Review before sending</div>
                  </div>

                  {jsonParseError && (
                    <div style={{ background: "#FDF0EC", border: `1px solid ${COLORS.alert}`, borderRadius: "8px", padding: "10px 14px", marginBottom: "14px", fontSize: "12.5px", color: COLORS.alert, lineHeight: "1.5" }}>
                      Couldn't structure this into editable line items — showing the raw response below. You can still copy or save it.
                    </div>
                  )}

                  {estimateData && !jsonParseError ? (
                    <div>
                      <div style={{ fontSize: "11px", color: COLORS.dusty, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "8px", fontWeight: "bold" }}>
                        Line Items — tap any field to edit
                      </div>

                      {estimateData.lineItems.map((it) => (
                        <div key={it.id} style={{ background: COLORS.parchment, border: `1px solid ${COLORS.parchmentDark}`, borderRadius: "10px", padding: "14px", marginBottom: "10px" }}>
                          <input
                            value={it.location}
                            onChange={(e) => updateLineItem(it.id, "location", e.target.value)}
                            placeholder="Species / item and location, e.g. Holly Oak (front)"
                            style={{ width: "100%", border: "none", outline: "none", fontFamily: "Georgia, serif", fontWeight: "bold", fontSize: "13px", color: COLORS.bark, marginBottom: "8px", background: "transparent", boxSizing: "border-box" }}
                          />
                          <textarea
                            value={it.action}
                            onChange={(e) => updateLineItem(it.id, "action", e.target.value)}
                            placeholder="Describe the specific action to be performed…"
                            rows={2}
                            style={{ width: "100%", border: `1px solid ${COLORS.parchmentDark}`, borderRadius: "6px", padding: "8px", fontFamily: "Georgia, serif", fontSize: "13px", lineHeight: "1.5", color: COLORS.bark, resize: "vertical", boxSizing: "border-box", marginBottom: "8px", background: COLORS.white }}
                          />
                          <input
                            value={it.note}
                            onChange={(e) => updateLineItem(it.id, "note", e.target.value)}
                            placeholder="Additional note (optional)"
                            style={{ width: "100%", border: "none", outline: "none", fontFamily: "Georgia, serif", fontStyle: "italic", fontSize: "12px", color: COLORS.dusty, marginBottom: "10px", background: "transparent", boxSizing: "border-box" }}
                          />
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: "4px" }}>
                              <span style={{ fontSize: "14px", color: COLORS.dusty }}>$</span>
                              <input
                                value={it.cost}
                                onChange={(e) => updateLineItem(it.id, "cost", e.target.value)}
                                placeholder="0.00"
                                inputMode="decimal"
                                style={{ width: "90px", border: `1px solid ${COLORS.parchmentDark}`, borderRadius: "6px", padding: "6px 8px", fontFamily: "Georgia, serif", fontSize: "14px", fontWeight: "bold", color: COLORS.bark, background: COLORS.white }}
                              />
                            </div>
                            <button onClick={() => removeLineItem(it.id)}
                              style={{ background: "none", border: "none", color: COLORS.alert, fontSize: "12px", cursor: "pointer", fontFamily: "Georgia, serif" }}>
                              Remove
                            </button>
                          </div>
                        </div>
                      ))}

                      <button onClick={addLineItem}
                        style={{ width: "100%", padding: "12px", background: COLORS.white, color: COLORS.moss, border: `1px dashed ${COLORS.sage}`, borderRadius: "10px", fontSize: "13px", fontWeight: "bold", cursor: "pointer", fontFamily: "Georgia, serif", marginBottom: "16px" }}>

                      </button>

                      <div style={{ background: COLORS.parchment, border: `1px solid ${COLORS.sage}`, borderRadius: "10px", padding: "14px", marginBottom: "12px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", fontWeight: "bold", fontSize: "16px", color: COLORS.moss }}>
                          <span>Subtotal</span><span>${estimateSubtotal().toFixed(2)}</span>
                        </div>
                      </div>

                      <button onClick={openPrintView}
                        style={{ width: "100%", padding: "14px", background: COLORS.moss, color: COLORS.white, border: "none", borderRadius: "10px", fontSize: "14px", fontWeight: "bold", cursor: "pointer", fontFamily: "Georgia, serif", marginBottom: "16px" }}>
                        Lock &amp; Generate PDF →
                      </button>

                      {estimateData.recommendations && (
                        <div style={{ fontSize: "12.5px", color: COLORS.dusty, lineHeight: "1.6", fontStyle: "italic", marginBottom: "4px" }}>
                          <strong style={{ color: COLORS.bark, fontStyle: "normal" }}>Recommendations: </strong>
                          {estimateData.recommendations}
                        </div>
                      )}
                    </div>
                  ) : (
                    <pre style={{ margin: 0, whiteSpace: "pre-wrap", fontFamily: "Georgia, serif", fontSize: "14px", lineHeight: "1.7", color: COLORS.bark }}>{result}</pre>
                  )}
                </div>

                {/* Signature / approval — Proposal & Estimate only */}
                {docTypeId === "estimate" && approvalStatus !== "approved" && (
                  <div style={{ marginTop: "10px", background: COLORS.white, border: `1px solid ${COLORS.parchmentDark}`, borderRadius: "10px", padding: "16px" }}>
                    {approvalStatus === "none" && (
                      <button onClick={() => setApprovalStatus("signing")}
                        style={{ width: "100%", padding: "12px", background: COLORS.fieldYellow, color: COLORS.bark, border: "none", borderRadius: "8px", fontSize: "14px", fontWeight: "bold", cursor: "pointer", fontFamily: "Georgia, serif" }}>
                        ✍️ Get Customer Signature
                      </button>
                    )}
                    {approvalStatus === "signing" && (
                      <div>
                        <div style={{ fontSize: "12px", color: COLORS.dusty, marginBottom: "8px", textTransform: "uppercase", letterSpacing: "0.08em" }}>
                          Hand the phone to your customer to sign below
                        </div>
                        <canvas ref={canvasRef} width={600} height={180}
                          onPointerDown={startDraw} onPointerMove={moveDraw} onPointerUp={endDraw} onPointerLeave={endDraw}
                          style={{ width: "100%", height: "140px", touchAction: "none", background: COLORS.parchment, border: `1.5px dashed ${COLORS.sage}`, borderRadius: "8px", marginBottom: "10px" }} />
                        <div style={{ display: "flex", gap: "8px" }}>
                          <button onClick={clearSignature}
                            style={{ flex: 1, padding: "10px", background: COLORS.parchmentDark, color: COLORS.bark, border: "none", borderRadius: "7px", fontSize: "13px", cursor: "pointer", fontFamily: "Georgia, serif" }}>
                            Clear
                          </button>
                          <button onClick={confirmApproval}
                            style={{ flex: 1.4, padding: "10px", background: COLORS.moss, color: COLORS.white, border: "none", borderRadius: "7px", fontSize: "13px", fontWeight: "bold", cursor: "pointer", fontFamily: "Georgia, serif" }}>
                            ✅ Confirm Approval
                          </button>
                        </div>
                        <button onClick={() => setApprovalStatus("none")}
                          style={{ width: "100%", marginTop: "8px", padding: "6px", background: "none", border: "none", color: COLORS.dusty, cursor: "pointer", fontSize: "12px", fontFamily: "Georgia, serif" }}>
                          Cancel
                        </button>
                      </div>
                    )}
                  </div>
                )}

                {docTypeId === "estimate" && approvalStatus === "approved" && (
                  <div style={{ marginTop: "10px", background: `${COLORS.moss}12`, border: `1px solid ${COLORS.moss}40`, borderRadius: "10px", padding: "16px" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "10px" }}>
                      {signatureData && <img src={signatureData} alt="Signature" style={{ height: "40px", background: COLORS.white, borderRadius: "4px", border: `1px solid ${COLORS.parchmentDark}` }} />}
                      <div>
                        <div style={{ fontSize: "13px", fontWeight: "bold", color: COLORS.moss }}>✅ Approved</div>
                        <div style={{ fontSize: "11px", color: COLORS.dusty }}>{approvedAt}</div>
                      </div>
                    </div>
                    {customerEmail.trim() ? (
                      <button onClick={resendConfirmationEmail}
                        style={{ width: "100%", padding: "10px", background: COLORS.moss, color: COLORS.white, border: "none", borderRadius: "7px", fontSize: "13px", fontWeight: "bold", cursor: "pointer", fontFamily: "Georgia, serif" }}>
                        📧 Send Confirmation to Customer
                      </button>
                    ) : (
                      <div style={{ fontSize: "11px", color: COLORS.dusty }}>Add a customer email above to send a confirmation copy.</div>
                    )}
                  </div>
                )}

                {/* Save panel */}
                {!showSavePanel && saveStatus !== "saved" && (
                  <button onClick={() => setShowSavePanel(true)}
                    style={{ width: "100%", marginTop: "10px", padding: "13px", background: COLORS.moss, color: COLORS.white, border: "none", borderRadius: "8px", fontSize: "14px", fontWeight: "bold", cursor: "pointer", fontFamily: "Georgia, serif" }}>
                    ☁ Save to Cloud
                  </button>
                )}

                {showSavePanel && saveStatus !== "saved" && (
                  <div style={{ marginTop: "10px", background: COLORS.white, border: `1px solid ${COLORS.parchmentDark}`, borderRadius: "10px", padding: "16px" }}>
                    <div style={{ fontSize: "12px", color: COLORS.dusty, marginBottom: "8px", textTransform: "uppercase", letterSpacing: "0.08em" }}>Save to ArborAI folder</div>
                    <input value={saveFilename} onChange={(e) => setSaveFilename(e.target.value)}
                      placeholder="Document name…"
                      style={{ width: "100%", padding: "10px 12px", borderRadius: "6px", border: `1px solid ${COLORS.parchmentDark}`, fontFamily: "Georgia, serif", fontSize: "14px", color: COLORS.bark, background: COLORS.parchment, boxSizing: "border-box", marginBottom: "12px" }} />
                    {saveError && <div style={{ fontSize: "12px", color: COLORS.alert, marginBottom: "10px" }}>⚠️ {saveError}</div>}
                    <div style={{ display: "flex", gap: "8px" }}>
                      <button onClick={() => saveToCloud("drive")} disabled={saveStatus === "saving"}
                        style={{ flex: 1, padding: "11px 8px", background: "#1a73e8", color: COLORS.white, border: "none", borderRadius: "7px", fontSize: "13px", fontWeight: "bold", cursor: saveStatus === "saving" ? "default" : "pointer", fontFamily: "Georgia, serif", opacity: saveStatus === "saving" ? 0.6 : 1 }}>
                        {saveStatus === "saving" ? "Saving…" : "📁 Google Drive"}
                      </button>
                      <button onClick={() => saveToCloud("onedrive")} disabled={saveStatus === "saving"}
                        style={{ flex: 1, padding: "11px 8px", background: "#0078d4", color: COLORS.white, border: "none", borderRadius: "7px", fontSize: "13px", fontWeight: "bold", cursor: saveStatus === "saving" ? "default" : "pointer", fontFamily: "Georgia, serif", opacity: saveStatus === "saving" ? 0.6 : 1 }}>
                        {saveStatus === "saving" ? "Saving…" : "☁ OneDrive"}
                      </button>
                    </div>
                    <button onClick={() => setShowSavePanel(false)}
                      style={{ width: "100%", marginTop: "8px", padding: "8px", background: "none", border: "none", color: COLORS.dusty, cursor: "pointer", fontSize: "12px", fontFamily: "Georgia, serif" }}>
                      Cancel
                    </button>
                  </div>
                )}

                {/* Saved confirmation */}
                {saveStatus === "saved" && (
                  <div style={{ marginTop: "10px", background: `${COLORS.moss}12`, border: `1px solid ${COLORS.moss}40`, borderRadius: "8px", padding: "12px 16px", display: "flex", alignItems: "center", gap: "8px" }}>
                    <span style={{ fontSize: "16px" }}>✅</span>
                    <div>
                      <div style={{ fontSize: "13px", fontWeight: "bold", color: COLORS.moss }}>Saved</div>
                      <div style={{ fontSize: "11px", color: COLORS.dusty, marginTop: "2px" }}>{savedTo}</div>
                    </div>
                  </div>
                )}

                {/* Copy + New Document + New Visit */}
                <div style={{ display: "flex", gap: "8px", marginTop: "10px" }}>
                  <button onClick={() => navigator.clipboard?.writeText(result)}
                    style={{ flex: 1, padding: "12px 6px", background: COLORS.parchmentDark, color: COLORS.bark, border: "none", borderRadius: "8px", fontSize: "13px", cursor: "pointer", fontFamily: "Georgia, serif" }}>
                    Copy
                  </button>
                  <button onClick={newDocument}
                    style={{ flex: 1, padding: "12px 6px", background: COLORS.white, color: COLORS.moss, border: `1.5px solid ${COLORS.moss}`, borderRadius: "8px", fontSize: "13px", fontWeight: "bold", cursor: "pointer", fontFamily: "Georgia, serif" }}>
                    📄 New Doc
                  </button>
                  <button onClick={reset}
                    style={{ flex: 1, padding: "12px 6px", background: COLORS.white, color: COLORS.bark, border: `1px solid ${COLORS.parchmentDark}`, borderRadius: "8px", fontSize: "13px", cursor: "pointer", fontFamily: "Georgia, serif" }}>
                    🌳 New Visit
                  </button>
                </div>
                <div style={{ display: "flex", gap: "8px", marginTop: "6px" }}>
                  <div style={{ flex: 1, textAlign: "center", fontSize: "10px", color: COLORS.dusty }}> </div>
                  <div style={{ flex: 1, textAlign: "center", fontSize: "10px", color: COLORS.dusty }}>Keep notes, new doc type</div>
                  <div style={{ flex: 1, textAlign: "center", fontSize: "10px", color: COLORS.dusty }}>Fresh start</div>
                </div>
              </div>
            )}
          </>
        )}
      </div>

      <style>{`
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
      `}</style>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<ArborAI />);
</script>
</body>
</html>
